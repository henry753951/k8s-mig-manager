name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting and lint
        run: bun run check

      - name: Type check
        run: bun run typecheck

      - name: Build package
        run: bun run build

      - name: Upgrade npm (recommended for trusted publishing)
        run: npm install -g npm@latest

      - name: Publish to npm (trusted publishing via OIDC)
        run: |
          # Trusted publishing via OIDC requires repository-side configuration
          # and that the repository is added as a Trusted Publisher on npmjs.org.
          npm publish --access public
